name: Update AI usage card

# data/usage.json 이 갱신되면 (collect-usage.sh 가 push) SVG/뱃지를 재렌더해서 커밋.
# 수동 실행도 가능.
on:
  push:
    paths:
      - "data/usage.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Render SVG card + badges
        run: node scripts/render-card.mjs

      - name: Commit rendered assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/ai-usage.svg data/badge-claude.json data/badge-codex.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: re-render AI usage card"
            git push
          fi
